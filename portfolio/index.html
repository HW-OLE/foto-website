<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Natur-, Landschafts- und Tierfotografie von Ole B.">
  <title>Fotos — Ole B Fotografie</title>
  <link rel="icon" href="/wp-content/uploads/2022/08/logo2-150x150.png">
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body>

<header class="site-header">
  <nav class="wrap nav">
    <a class="brand" href="/">
      <img src="/wp-content/uploads/2022/08/logo2-modified-150x150.png" alt="Ole B Fotografie Logo">
      <span>Ole B Fotografie</span>
    </a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/about/">Über mich</a>
      <a aria-current="page" href="/portfolio/">Fotos</a>
      <a href="/contact/">Kontakt</a>
      <a href="/instagram/">Instagram</a>
    </div>
  </nav>
</header>

<main>
  <div class="wrap">
    <section class="page-hero">
      <p class="eyebrow">Portfolio</p>
      <h1 class="page-title">Fotos</h1>
      <p class="lead">Eine Auswahl aus den Bilddateien. Zum Öffnen der großen Version einfach ein Bild anklicken.</p>
    </section>
  </div>
  <div class="wrap">
    <section class="section grid gallery" id="gallery" aria-label="Fotogalerie"></section>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    © 2025 Ole B Fotografie · Bilder unter
    <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noreferrer">CC BY-NC 4.0</a>
  </div>
</footer>

<script>
(function () {

  /* ── Bildliste ── */
  var PHOTOS = [
    '/wp-content/uploads/2022/08/DSC00295.jpg',
    '/wp-content/uploads/2022/08/DSC00333.jpg',
    '/wp-content/uploads/2022/08/DSC0367.jpg',
    '/wp-content/uploads/2022/08/DSC6709.jpg',
    '/wp-content/uploads/2022/08/wiesenentwaesserung.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_147_151025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_154_151025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_169_151025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_186_171025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_28_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_30_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_45_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_56_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_6_131025.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC0128.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC5749.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC5768.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC6503.jpg'
  ];

  /* ── Galerie ── */
  var SLOTS = ['wide','wide','small','tall','small','small','wide','small','small','wide','small','tall'];

  function shuffle(arr) {
    var a = arr.slice(), i, j, t;
    for (i = a.length - 1; i > 0; i--) {
      j = Math.floor(Math.random() * (i + 1));
      t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function buildPool(n) {
    var pool = [];
    while (pool.length < n) pool = pool.concat(SLOTS);
    return shuffle(pool).slice(0, n);
  }

  var gallery = document.getElementById('gallery');
  var ordered = shuffle(PHOTOS);
  var pool    = buildPool(ordered.length);

  ordered.forEach(function (src, i) {
    var a       = document.createElement('a');
    a.className = 'photo ' + (pool.shift() || 'small');
    a.href      = src;

    var img     = document.createElement('img');
    img.src     = src;
    img.alt     = 'Foto von Ole B';
    img.loading = 'lazy';
    a.appendChild(img);

    a.addEventListener('click', function (e) {
      e.preventDefault();
      open(i);
    });

    gallery.appendChild(a);
  });

  /* ── Viewer ──
     Wird komplett per JS ins document.body gehängt,
     NACH dem Header — kein backdrop-filter Elternelement,
     keine CSS-Konflikte möglich.
  ── */
  var srcs = ordered;
  var idx  = 0;

  // Overlay
  var overlay = document.createElement('div');
  overlay.id  = 'viewer';
  set(overlay, {
    display:         'none',
    position:        'fixed',
    top:             '0',
    left:            '0',
    width:           '100vw',
    height:          '100vh',
    background:      'rgba(8,9,11,0.96)',
    zIndex:          '999999',
    alignItems:      'center',
    justifyContent:  'center',
    boxSizing:       'border-box'
  });

  // Bild
  var pic = document.createElement('img');
  set(pic, {
    display:   'block',
    maxWidth:  'calc(100vw - 100px)',
    maxHeight: 'calc(100vh - 60px)',
    width:     'auto',
    height:    'auto',
    objectFit: 'contain',
    borderRadius: '10px'
  });

  // Schließen
  var btnClose = btn('✕',  { top:'16px', right:'20px' });
  var btnPrev  = btn('←',  { top:'50%',  left:'16px',  transform:'translateY(-50%)' });
  var btnNext  = btn('→',  { top:'50%',  right:'16px', transform:'translateY(-50%)' });

  overlay.appendChild(pic);
  overlay.appendChild(btnClose);
  overlay.appendChild(btnPrev);
  overlay.appendChild(btnNext);
  document.body.appendChild(overlay);

  function btn(label, pos) {
    var b = document.createElement('button');
    b.textContent = label;
    var s = {
      position:   'fixed',
      background: 'rgba(255,255,255,0.1)',
      border:     '1px solid rgba(255,255,255,0.2)',
      color:      '#f4f0e8',
      borderRadius: '999px',
      cursor:     'pointer',
      fontSize:   '1.3rem',
      lineHeight: '1',
      padding:    '0.7rem 1rem',
      fontFamily: 'inherit',
      zIndex:     '1000000'
    };
    Object.assign(s, pos);
    set(b, s);
    return b;
  }

  function set(el, styles) {
    Object.assign(el.style, styles);
  }

  function show() {
    pic.src         = srcs[idx];
    btnPrev.style.display = idx === 0            ? 'none' : 'block';
    btnNext.style.display = idx === srcs.length-1 ? 'none' : 'block';
  }

  function open(i) {
    idx = i;
    show();
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    btnClose.focus();
  }

  function close() {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
  }

  btnClose.addEventListener('click', close);
  btnPrev.addEventListener('click',  function() { idx--; show(); });
  btnNext.addEventListener('click',  function() { idx++; show(); });
  overlay.addEventListener('click',  function(e) { if (e.target === overlay) close(); });

  document.addEventListener('keydown', function(e) {
    if (overlay.style.display === 'none') return;
    if (e.key === 'Escape')                              close();
    if (e.key === 'ArrowLeft'  && idx > 0)               { idx--; show(); }
    if (e.key === 'ArrowRight' && idx < srcs.length - 1) { idx++; show(); }
  });

})();
</script>

</body>
</html>
