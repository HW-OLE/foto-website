<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Natur-, Landschafts- und Tierfotografie von Ole B.">
  <title>Fotos — Ole B Fotografie</title>
  <link rel="icon" href="/wp-content/uploads/2022/08/logo2-150x150.png">
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body>

<header class="site-header">
  <nav class="wrap nav">
    <a class="brand" href="/">
      <img src="/wp-content/uploads/2022/08/logo2-modified-150x150.png" alt="Ole B Fotografie Logo">
      <span>Ole B Fotografie</span>
    </a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/about/">Über mich</a>
      <a aria-current="page" href="/portfolio/">Fotos</a>
      <a href="/contact/">Kontakt</a>
      <a href="/instagram/">Instagram</a>
    </div>
  </nav>
</header>

<main>
  <div class="wrap">
    <section class="page-hero">
      <p class="eyebrow">Portfolio</p>
      <h1 class="page-title">Fotos</h1>
      <p class="lead">Eine Auswahl aus den Bilddateien. Zum Öffnen der großen Version einfach ein Bild anklicken.</p>
    </section>
  </div>
  <div class="wrap">
    <section class="section grid gallery" id="gallery" aria-label="Fotogalerie"></section>
  </div>
</main>

<!-- Lightbox -->
<style>
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(8,9,11,.96);
    align-items: center;
    justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: calc(100vw - 120px);
    max-height: calc(100vh - 80px);
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,.7);
    display: block;
  }
  #lightbox-close, #lightbox-prev, #lightbox-next {
    position: fixed;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    color: #f4f0e8;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1.4rem;
    line-height: 1;
    font-family: inherit;
    transition: background .2s, border-color .2s;
  }
  #lightbox-close { top: 20px; right: 24px; padding: .6rem .9rem; font-size: 1.1rem; }
  #lightbox-prev  { top: 50%; left: 16px;  transform: translateY(-50%); padding: .8rem 1.1rem; }
  #lightbox-next  { top: 50%; right: 16px; transform: translateY(-50%); padding: .8rem 1.1rem; }
  #lightbox-close:hover, #lightbox-prev:hover, #lightbox-next:hover {
    background: rgba(215,168,95,.18);
    border-color: rgba(215,168,95,.7);
  }
  @media (max-width: 760px) {
    #lightbox img { max-width: 100vw; max-height: calc(100vh - 120px); border-radius: 0; }
    #lightbox-prev { left: 4px; }
    #lightbox-next { right: 4px; }
  }
</style>
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Bild in voller Größe">
  <button id="lightbox-close" aria-label="Schließen">✕</button>
  <button id="lightbox-prev" aria-label="Vorheriges Bild">&#8592;</button>
  <button id="lightbox-next" aria-label="Nächstes Bild">&#8594;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<footer class="site-footer">
  <div class="wrap">
    © 2025 Ole B Fotografie · Bilder unter
    <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noreferrer">CC BY-NC 4.0</a>
  </div>
</footer>

<script>
(function () {
  var PHOTOS = [
    '/wp-content/uploads/2022/08/DSC00295.jpg',
    '/wp-content/uploads/2022/08/DSC00333.jpg',
    '/wp-content/uploads/2022/08/DSC0367.jpg',
    '/wp-content/uploads/2022/08/DSC6709.jpg',
    '/wp-content/uploads/2022/08/wiesenentwaesserung.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_147_151025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_154_151025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_169_151025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_186_171025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_28_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_30_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_45_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_56_131025.jpg',
    '/wp-content/uploads/auswahl_neu/Kursfahrt_6_131025.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC0128.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC5749.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC5768.jpg',
    '/wp-content/uploads/auswahl_neu/_DSC6503.jpg'
  ];

  var SLOTS = ['wide','wide','small','tall','small','small','wide','small','small','wide','small','tall'];

  function shuffle(arr) {
    var a = arr.slice(), i, j, t;
    for (i = a.length - 1; i > 0; i--) {
      j = Math.floor(Math.random() * (i + 1));
      t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function buildPool(n) {
    var pool = [];
    while (pool.length < n) pool = pool.concat(SLOTS);
    return shuffle(pool).slice(0, n);
  }

  function pickSlot(pool) {
    return pool.shift() || 'small';
  }

  /* ── Galerie rendern ── */
  var gallery = document.getElementById('gallery');
  var ordered = shuffle(PHOTOS);
  var pool    = buildPool(ordered.length);

  ordered.forEach(function (src, i) {
    var a   = document.createElement('a');
    a.className = 'photo ' + pickSlot(pool);
    a.href  = src;

    var img = document.createElement('img');
    img.src     = src;
    img.alt     = 'Foto von Ole B';
    img.loading = 'lazy';

    a.appendChild(img);

    a.addEventListener('click', function (e) {
      e.preventDefault();
      lbOpen(ordered, i);
    });

    gallery.appendChild(a);
  });

  /* ── Lightbox ── */
  var lightbox = document.getElementById('lightbox');
  var lbImg    = document.getElementById('lightbox-img');
  var lbClose  = document.getElementById('lightbox-close');
  var lbPrev   = document.getElementById('lightbox-prev');
  var lbNext   = document.getElementById('lightbox-next');
  var lbSrcs   = [];
  var lbIdx    = 0;

  function lbShow() {
    lbImg.src     = lbSrcs[lbIdx];
    lbImg.alt     = 'Foto ' + (lbIdx + 1) + ' von ' + lbSrcs.length;
    lbPrev.hidden = lbIdx === 0;
    lbNext.hidden = lbIdx === lbSrcs.length - 1;
  }

  function lbOpen(srcs, idx) {
    lbSrcs = srcs; lbIdx = idx;
    lbShow();
    lightbox.classList.add("open");
    document.body.style.overflow = 'hidden';
    lbClose.focus();
  }

  function lbCloseAll() {
    lightbox.classList.remove("open");
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', lbCloseAll);
  lbPrev.addEventListener('click',  function () { lbIdx--; lbShow(); });
  lbNext.addEventListener('click',  function () { lbIdx++; lbShow(); });
  lightbox.addEventListener('click', function (e) { if (e.target === lightbox) lbCloseAll(); });
  document.addEventListener('keydown', function (e) {
    if (!lightbox.classList.contains("open")) return;
    if (e.key === 'Escape')                                   lbCloseAll();
    if (e.key === 'ArrowLeft'  && lbIdx > 0)                 { lbIdx--; lbShow(); }
    if (e.key === 'ArrowRight' && lbIdx < lbSrcs.length - 1) { lbIdx++; lbShow(); }
  });
})();
</script>

</body>
</html>
